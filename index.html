<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Te amo pau mi princesita hermosa</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
}

/* canvas estrellas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* título */
h1 {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 4vmin;
    top: 10px;
    color: #fff;
    text-shadow: 0 0 10px #0077ff, 0 0 20px #00ffff;
    z-index: 2;
    animation: entradaTitulo 2s ease-out forwards;
}

@keyframes entradaTitulo {
    0% {
        opacity: 0;
        transform: translateY(-20px);
        filter: blur(10px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
    }
}

/* galaxia */
.galaxy {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* centro */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #ffdb3a, #ff8c00);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 40px #ff8c00, 0 0 80px rgba(255, 140, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    font-size: 13px;
    z-index: 3;
    color: white;
    text-shadow: 0 0 8px #fff, 0 0 15px #ffdb3a;
    letter-spacing: 1px;
    animation: pulse-text 3s ease-in-out infinite;
}

@keyframes pulse-text {
    0%, 100% {
        text-shadow: 0 0 8px #fff, 0 0 15px #ffdb3a;
        transform: translate(-50%, -50%) scale(1);
    }
    50% {
        text-shadow: 0 0 15px #fff, 0 0 30px #ffdb3a, 0 0 45px #ff8c00;
        transform: translate(-50%, -50%) scale(1.08);
    }
}

/* corona del sol */
.sun-corona {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 160px;
    height: 160px;
    background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(255, 140, 0, 0.3) 10%,
        transparent 20%,
        rgba(255, 219, 58, 0.3) 40%,
        transparent 50%,
        rgba(255, 140, 0, 0.3) 70%,
        transparent 80%,
        rgba(255, 219, 58, 0.3) 90%,
        transparent 100%
    );
    border-radius: 50%;
    transform: translate(-50%, -50%);
    filter: blur(15px);
    z-index: 2;
    animation: rotate-corona 20s linear infinite;
    pointer-events: none;
}

@keyframes rotate-corona {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* órbitas */
.orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}

/* planeta */
.planet {
    position: absolute;
    width: 6vmin;
    height: 6vmin;
    min-width: 18px;
    min-height: 18px;
    border-radius: 50%;
    left: 50%;
    transform: translateX(-50%);
    transition: transform 0.3s, filter 0.3s;
    pointer-events: auto;
    cursor: pointer;
}

.planet:hover {
    transform: translateX(-50%) scale(1.2);
    filter: brightness(1.4) drop-shadow(0 0 15px white);
}

.planet:active {
    transform: translateX(-50%) scale(1.5);
}

/* nombre del mes sobre el planeta */
.planet-name {
    position: absolute;
    bottom: 115%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    color: white;
    text-shadow: 0 0 5px #0077ff;
    white-space: nowrap;
    pointer-events: none;
}

/* Animación para mantener el texto nivelado */
@keyframes rotateReverse {
    from { transform: translateX(-50%) rotate(0deg); }
    to { transform: translateX(-50%) rotate(-360deg); }
}

/* estilo para el planeta del futuro */
.future-planet {
    animation: whitePulse 2.5s ease-in-out infinite alternate;
}

@keyframes whitePulse {
    from {
        box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
    }
    to {
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.8), 0 0 45px rgba(255, 255, 255, 0.3);
    }
}

.ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 180%;
    height: 180%;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    transform: translate(-50%, -50%) rotateX(75deg);
    pointer-events: none;
}

/* animación órbita */
@keyframes rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* cometas de frases */
.comet {
    position: fixed;
    white-space: nowrap;
    color: white;
    font-weight: bold;
    font-size: 0.7rem;
    text-shadow: 0 0 5px #fff, 0 0 15px #0077ff;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    filter: blur(0.5px);
}

@keyframes cometFlow {
    0% { transform: translate(-110%, 0) rotate(-15deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translate(110vw, 50vh) rotate(-15deg); opacity: 0; }
}

/* chispas de la estela */
.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
}

@keyframes sparkleFade {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
}

/* modal */
#modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

#contenido {
    background: rgba(20, 20, 20, 0.7);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    width: 85%;
    max-width: 320px;
    max-height: 80vh;
    overflow-y: auto;
    border: 1px solid rgba(0, 191, 255, 0.5);
    box-shadow: 0 0 20px rgba(0, 191, 255, 0.7);
    animation: aparecer 0.4s ease;
}

@keyframes aparecer {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* confeti de corazones */
.heart-confetti {
    position: fixed;
    font-size: 1.5rem;
    pointer-events: none;
    z-index: 100;
    user-select: none;
}

@keyframes heartBurst {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    100% { 
        transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) rotate(var(--tr)) scale(1.2); 
        opacity: 0; 
    }
}

#galeria-imagenes {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px; /* Espacio entre las imágenes */
}

#galeria-imagenes img {
    width: 48%; /* Para que quepan dos imágenes por fila con un pequeño espacio */
    border-radius: 10px;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    width: auto;
    font-size: 0.75rem;
    border: 1px solid rgba(0, 255, 255, 0.4);
    border-radius: 50px;
    background: rgba(0, 119, 255, 0.2);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'Orbitron', sans-serif;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 0 10px rgba(0, 119, 255, 0.2);
}

button:hover {
    background: rgba(0, 255, 255, 0.3);
    border-color: #00ffff;
    scale: 1.05;
    box-shadow: 0 0 20px rgba(0, 119, 255, 0.5);
}

#contenido button {
    width: 100%;
}

/* contador */
#contador {
    position: absolute;
    bottom: 80px;
    width: 100%;
    text-align: center;
    font-size: 2.8vmin;
    z-index: 2;
    color: #fff;
    text-shadow: 0 0 10px #00ffff;
    animation: neonPulse 2s infinite alternate;
}

@keyframes neonPulse {
    from {
        text-shadow: 0 0 10px #00ffff, 0 0 20px #0077ff;
    }
    to {
        text-shadow: 0 0 15px #00ffff, 0 0 30px #0077ff, 0 0 40px #0077ff;
        opacity: 0.85;
    }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>Te amo pau mi princesita hermosa</h1>

<div class="galaxy">
    <div class="sun-corona"></div>
    <div class="center" onclick="mostrarCartaSol()">Pau + Miki</div>
</div>

<div id="contador"></div>

<div id="modal">
    <div id="contenido">
        <div id="corazon-abril" class="heart-beat">💙</div>
        <h2 id="titulo"></h2>
        <p id="texto"></p>
        <div id="galeria-imagenes"></div>
        <button onclick="cerrar()">Cerrar 💙</button>
    </div>
</div>

<button onclick="activarMusica()" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:2;">
🎶 Música
</button>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mp3">
</audio>

<script>
// ⭐ estrellas animadas
let canvas = document.getElementById("stars");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let stars = [];

for(let i=0;i<150;i++){
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: Math.random()*2
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    stars.forEach(s=>{
        ctx.fillRect(s.x,s.y,s.size,s.size);
        s.y += 0.2;
        if(s.y > canvas.height) s.y = 0;
    });

    requestAnimationFrame(drawStars);
}
drawStars();

// 💖 recuerdos
let recuerdos = [
    {
        titulo: "Febrero 💫",
        texto: "Aquí comenzó todo… cuando hablar contigo se volvió lo más importante para mí 💖. Nos conocimos en Sweet Dance un 20 de Febrero, ese juego de baile que unió nuestros mundos.",
        img: ["febrero 1.jpeg", "febrero 2.jpeg"]
    },
    {
        titulo: "Marzo 🌙",
        texto: "Entre risas, cartas y momentos juntos… me di cuenta de que ya eras parte de mi vida ✨. Además, celebramos una fecha muy importante: tu cumpleaños el 25 de Marzo.",
        img: ["marzo 1.jpeg", "marzo 2.jpeg"]
    },
    {
        titulo: "Abril 🌌",
        texto: "Pasamos algunos malentendidos y problemitas... pero en una llamada que hicimos dibujamos un corazón juntos y fue muy lindo.Y entendimos que queríamos quedarnos 💕",
        img: ["abril.jpeg"]
    },
    {
        titulo: "Mayo 🌊",
        texto: "Cada día es más especial y quiero seguir contruyendo este nuevo planeta contigo mi princesita...",
        img: ["foto4.png"]
    }
];

// 🪐 crear planetas
let galaxy = document.querySelector(".galaxy");

recuerdos.forEach((r, i) => {
    let orbit = document.createElement("div");
    orbit.className = "orbit";

    let duration = 12 + i * 4;
    let size = 30 + i * 18;

    orbit.style.width = size + "vmin";
    orbit.style.height = size + "vmin";
    orbit.style.animation = `rotate ${duration}s linear infinite`;

    let planet = document.createElement("div");
    planet.className = "planet";
    planet.style.top = "-3vmin"; // Centra el planeta sobre la línea de la órbita

    // Generar un color único basado en el índice (HUE)
    let hue = (i * 137.5) % 360; 

    // Etiqueta con el nombre del mes
    let nameLabel = document.createElement("div");
    nameLabel.className = "planet-name";
    nameLabel.innerText = r.titulo;
    nameLabel.style.animation = `rotateReverse ${duration}s linear infinite`;
    planet.appendChild(nameLabel);

    // Si es el último planeta, no tiene color (estilo misterioso/nueva historia)
    if (i === recuerdos.length - 1) {
        planet.classList.add("future-planet");
        planet.style.background = "rgba(255, 255, 255, 0.1)";
        planet.style.border = "2px dashed rgba(255, 255, 255, 0.4)";
    } else {
        planet.style.background = `radial-gradient(circle at 30% 30%, hsl(${hue}, 80%, 75%), hsl(${hue}, 80%, 45%))`;
        planet.style.boxShadow = `0 0 20px hsla(${hue}, 80%, 60%, 0.7)`;
    }

    planet.onclick = () => mostrar(i);

    // Añadir anillos aleatoriamente (50% de probabilidad)
    if (Math.random() > 0.5) {
        let ring = document.createElement("div");
        ring.className = "ring";
        ring.style.borderColor = `hsla(${hue}, 80%, 70%, 0.4)`;
        planet.appendChild(ring);
    }

    orbit.appendChild(planet);
    galaxy.appendChild(orbit);
});

// 💌 modal
function lanzarConfeti() {
    const cantidad = 25;
    for (let i = 0; i < cantidad; i++) {
        const heart = document.createElement("div");
        heart.className = "heart-confetti";
        heart.innerText = "💙";
        heart.style.left = "50vw";
        heart.style.top = "50vh";
        
        // Direcciones y rotaciones aleatorias
        const tx = (Math.random() - 0.5) * 400 + "px";
        const ty = (Math.random() - 0.5) * 400 + "px";
        const tr = (Math.random() * 360) + "deg";
        
        heart.style.setProperty('--tx', tx);
        heart.style.setProperty('--ty', ty);
        heart.style.setProperty('--tr', tr);
        
        heart.style.animation = `heartBurst ${0.8 + Math.random()}s ease-out forwards`;
        
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 2000);
    }
}

function mostrar(i){
    const r = recuerdos[i];
    document.getElementById("titulo").innerText = r.titulo;
    document.getElementById("texto").innerText = r.texto;
    
    // Mostrar el corazón latiendo solo si es Abril
    const corazon = document.getElementById("corazon-abril");
    corazon.style.display = r.titulo.includes("Abril") ? "block" : "none";
    
    const galeria = document.getElementById("galeria-imagenes");
    galeria.innerHTML = ""; // Limpiar imágenes anteriores
    
    // Creamos una etiqueta <img> por cada ruta en el array
    r.img.forEach(src => {
        let img = document.createElement("img");
        img.src = src;
        galeria.appendChild(img);
    });

    document.getElementById("modal").style.display = "flex";
    lanzarConfeti();
}

function mostrarCartaSol(){
    document.getElementById("titulo").innerText = "Para mi princesita 💌";
    document.getElementById("texto").innerText = "Gracias por alegrarme el día con tu hermosa voz y con tus hermosas cartas. Gracias simplemente por existir. Me gustas muchísimo y te amo con todo mi corazón, y espero que sigamos construyendo más planetas juntos en nuestra galaxia. 💙";
    
    const corazon = document.getElementById("corazon-abril");
    if (corazon) corazon.style.display = "none"; // Ocultar el corazón de abril si existe

    const galeria = document.getElementById("galeria-imagenes");
    galeria.innerHTML = ""; // Limpiar galería para la carta
    
    document.getElementById("modal").style.display = "flex";
    lanzarConfeti();
}

function cerrar(){
    document.getElementById("modal").style.display = "none";
}

// 🎶 música
function activarMusica(){
    document.getElementById("musica").play();
}

// 🌠 cometas de frases
const frases = ["mi amors", "patito", "princesita", "bella durmiente", "miki pelon", "bueni", "amiguis", "patito fresa", "principe fresa"];

function crearCometa() {
    const cometa = document.createElement("div");
    cometa.className = "comet";
    cometa.innerText = frases[Math.floor(Math.random() * frases.length)];

    // Posición vertical inicial aleatoria
    const startY = Math.random() * 70; 
    cometa.style.top = startY + "vh";
    cometa.style.left = "-100px";

    const duracion = 6 + Math.random() * 6;
    cometa.style.animation = `cometFlow ${duracion}s linear forwards`;

    document.body.appendChild(cometa);

    // Crear estela de chispas
    const interval = setInterval(() => {
        const rect = cometa.getBoundingClientRect();
        if (rect.left > window.innerWidth || rect.right < 0) return;

        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        
        // Posición y color aleatorio mágico
        sparkle.style.left = rect.left + "px";
        sparkle.style.top = (rect.top + rect.height / 2) + "px";
        sparkle.style.background = `hsl(${Math.random() * 40 + 190}, 100%, 80%)`; // Tonos azules/cian
        sparkle.style.boxShadow = `0 0 8px ${sparkle.style.background}`;
        sparkle.style.animation = "sparkleFade 0.8s ease-out forwards";

        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 800);
    }, 60);

    // Limpiar el elemento al terminar
    setTimeout(() => {
        clearInterval(interval);
        cometa.remove();
    }, duracion * 1000);
}

// Lanzar un cometa cada 4-8 segundos
setInterval(crearCometa, 4000 + Math.random() * 4000);

// ⏳ contador real
let inicio = new Date("2026-01-31"); // CAMBIA ESTA FECHA

function actualizarContador(){
    let hoy = new Date();
    let diff = hoy - inicio;

    // Calcular total de meses
    let meses = (hoy.getFullYear() - inicio.getFullYear()) * 12 + (hoy.getMonth() - inicio.getMonth());
    if (hoy.getDate() < inicio.getDate()) {
        meses--;
    }

    let dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    let horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
    let minutos = Math.floor((diff / (1000 * 60)) % 60);
    let segundos = Math.floor((diff / 1000) % 60);

    document.getElementById("contador").innerText =
        `${meses} meses | ${dias}d ${horas}h ${minutos}m ${segundos}s juntos 💙`;
}

setInterval(actualizarContador, 1000);
</script>

</body>
</html>
